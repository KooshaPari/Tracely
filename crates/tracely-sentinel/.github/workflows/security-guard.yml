name: Security Guard
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 0 * * *'
jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@bfa4b33a0e6c6c9c97c9d7e6e6f6c2d6a7c7c7c7 # pinned from @master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'

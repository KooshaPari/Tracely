name: Release

# Triggered by pushing a semver tag: v0.1.0, v1.2.3, etc.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip publish and GitHub Release)"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write   # create GitHub Release + upload assets
  id-token: write   # provenance attestation (OIDC)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # -------------------------------------------------------------------------
  # 1. Preflight: build + test + semver checks
  # -------------------------------------------------------------------------
  preflight:
    name: Preflight (build / test / semver)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # needed for semver baseline

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build (all features)
        run: cargo build --workspace --all-features --verbose

      - name: Test (all features)
        run: cargo test --workspace --all-features --verbose

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

      - name: cargo-semver-checks
        uses: obi1kenobi/cargo-semver-checks-action@7272cc2caa468d3e009a2b0a9cc366839348237b # v2.6

  # -------------------------------------------------------------------------
  # 2. Security: audit + deny + SBOM + OSV scan
  # -------------------------------------------------------------------------
  security:
    name: Security gates
    runs-on: ubuntu-24.04
    needs: preflight
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: cargo-audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

      - name: cargo-deny
        run: |
          cargo install cargo-deny --locked
          cargo deny check

      - name: Install cargo-cyclonedx (SBOM)
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json --output-prefix tracely-sbom
          ls tracely-sbom*.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: sbom
          path: tracely-sbom*.json
          retention-days: 90

  # -------------------------------------------------------------------------
  # 3. Publish crates to crates.io (skip on dry-run)
  # -------------------------------------------------------------------------
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-24.04
    needs: [preflight, security]
    if: ${{ github.event_name == 'push' || inputs.dry_run == 'false' }}
    environment: crates-io   # requires CARGO_REGISTRY_TOKEN secret
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      # Publish workspace members in dependency order.
      # `--no-verify` skips the redundant build already done in preflight.
      - name: Publish tracely (core)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p tracely --no-verify

      - name: Publish phenotype-sentinel
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p phenotype-sentinel --no-verify

  # -------------------------------------------------------------------------
  # 4. GitHub Release with changelog excerpt and SBOM attachment
  # -------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    needs: [preflight, security]
    if: ${{ github.event_name == 'push' || inputs.dry_run == 'false' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download SBOM
        uses: actions/download-artifact@fa0a91b85d4f404e444306b1cd85dfc0ac8a9a32 # v4.1.8
        with:
          name: sbom

      - name: Extract changelog for this version
        id: changelog
        # VERSION comes from GITHUB_REF_NAME (a semver tag like v1.2.3).
        # It is passed to awk via -v to avoid shell word-splitting and
        # regex-injection through direct interpolation into the awk pattern.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          NOTES=$(awk -v ver="$VERSION" \
            'BEGIN{esc=ver; gsub(/[.[+?^${}()|\\]/, "\\\\&", esc)} \
             /^## \[?/ && $0 ~ "\\[?"esc"\\]?"{found=1; next} \
             found && /^## /{exit} \
             found{print}' CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "${NOTES:-No changelog entry found for ${VERSION}.}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: tracely-sbom*.json
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
